auth_enabled: false

server:
  http_listen_port: ${LOKI_HTTP_PORT}
  grpc_listen_port: ${LOKI_GRPC_PORT}

common:
  path_prefix: ${LOKI_DATA_PATH}
  storage:
    filesystem:
      chunks_directory: ${LOKI_DATA_PATH}/chunks
      rules_directory: ${LOKI_DATA_PATH}/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

ingester:
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  wal:
    enabled: true
    dir: ${LOKI_DATA_PATH}/wal

schema_config:
  configs:
    - from: 2024-04-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: ${LOKI_DATA_PATH}/tsdb-index
    cache_location: ${LOKI_DATA_PATH}/tsdb-cache
  filesystem:
    directory: ${LOKI_DATA_PATH}/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: ${LOKI_RETENTION_PERIOD}
  retention_period: ${LOKI_RETENTION_PERIOD}

compactor:
  working_directory: ${LOKI_DATA_PATH}/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem
