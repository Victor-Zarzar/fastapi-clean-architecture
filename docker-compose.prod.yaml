services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "8006"
    env_file: .env.prod
    restart: always
    depends_on:
      - postgres
      - zookeeper
      - kafka
      - redis
    networks:
      - app-network

  redis:
    image: redis:8.6.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    env_file:
      - .env.prod
    networks:
      - app-network

  postgres:
    image: postgres:17-alpine
    container_name: postgres-server
    restart: always
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper-cost-map
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-cost-map
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  nginx:
    image: nginx:1.27.3-alpine
    container_name: api-cost-map-nginx
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - app-network
    restart: always
    env_file: .env.prod
    command: >
      /bin/sh -c "envsubst '$${BACKEND_HOST} $${BACKEND_PORT}'  < /etc/nginx/nginx.conf.template  > /etc/nginx/nginx.conf  && exec nginx -g 'daemon off;'"

  loki:
    image: grafana/loki:3.6.3
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml
    command: -config.file=/etc/loki/local-config.yml -config.expand-env=true
    env_file:
      - .env.prod
    networks:
      - app-network

  promtail:
    image: grafana/promtail:3.5.1
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ./logs/nginx:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true -log.level=warn
    env_file:
      - .env.prod
    networks:
      - app-network

  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_LOG_LEVEL=warn
    env_file:
      - .env.prod
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  redis-data:
