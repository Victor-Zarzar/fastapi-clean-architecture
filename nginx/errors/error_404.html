<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>404 - Not Found</title>
        <style>
            body {
                margin: 0;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    Ubuntu,
                    sans-serif;
                background: #0f1419;
                color: #e5e7eb;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .container {
                text-align: center;
                max-width: 520px;
                padding: 2rem;
            }

            .code {
                font-size: 4rem;
                font-weight: 800;
                color: #3b82f6;
                margin-bottom: 1rem;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 1rem;
            }

            p {
                color: #9ca3af;
                line-height: 1.6;
                margin-bottom: 2rem;
            }

            .actions a {
                display: inline-block;
                margin: 0 0.5rem;
                padding: 0.6rem 1.2rem;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 600;
                color: #fff;
                background: #3b82f6;
            }

            .actions a.secondary {
                background: #1f2937;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="code">404</div>
            <h1>Not Found</h1>
            <p>The requested resource could not be found on this server.</p>
        </div>
    </body>
</html>
